<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 184.95 61.06">
  <defs>
    <style>
      .cls-1 {
        filter: url(#drop-shadow-2);
      }

      .cls-2 {
        filter: url(#drop-shadow-5);
      }

      .cls-3 {
        filter: url(#drop-shadow-1);
        font-size: 23.5px;
      }

      .cls-3, .cls-4 {
        fill: #1e3050;
        font-family: AndaleMono, 'Andale Mono';
      }

      .cls-4 {
        filter: url(#drop-shadow-4);
        font-size: 24.96px;
      }
    </style>
    <filter id="drop-shadow-1" filterUnits="userSpaceOnUse">
      <feOffset dx="1" dy="1"/>
      <feGaussianBlur result="blur" stdDeviation="0"/>
      <feFlood flood-color="#73b0d6" flood-opacity="1"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
    <filter id="drop-shadow-2" x="13.21" y="0" width="45.54" height="46.79" filterUnits="userSpaceOnUse">
      <feOffset dx="1" dy="1"/>
      <feGaussianBlur result="blur-2" stdDeviation="0"/>
      <feFlood flood-color="#73b0d6" flood-opacity="1"/>
      <feComposite in2="blur-2" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
    <filter id="drop-shadow-4" filterUnits="userSpaceOnUse">
      <feOffset dx="1" dy="1"/>
      <feGaussianBlur result="blur-3" stdDeviation="0"/>
      <feFlood flood-color="#73b0d6" flood-opacity="1"/>
      <feComposite in2="blur-3" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
    <filter id="drop-shadow-5" x="25.58" y="11.99" width="20.07" height="19.73" filterUnits="userSpaceOnUse">
      <feOffset dx="1" dy="1"/>
      <feGaussianBlur result="blur-4" stdDeviation="0"/>
      <feFlood flood-color="#73b0d6" flood-opacity="0"/>
      <feComposite in2="blur-4" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>
  <text class="cls-3" transform="translate(0 54.93)"><tspan x="0" y="0">Accessibility</tspan></text>
  <image class="cls-1" width="640" height="640" transform="translate(13.21) scale(.07)" xlink:href="../Downloads/laptop-solid.png"/>
  <text class="cls-4" transform="translate(60.59 33.75) scale(1.06 1)"><tspan x="0" y="0">Digital</tspan></text>
  <image class="cls-2" width="640" height="640" transform="translate(25.58 11.99) scale(.03)" xlink:href="../Downloads/universal-access-solid.png"/>
