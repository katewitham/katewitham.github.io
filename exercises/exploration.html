<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploration</title>
    <link rel="stylesheet" href="styles.css">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background-color: darksalmon;
}

header {
  text-align: center;
  padding: 32px;
}

img {
  width: 250px;
  box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
  text-align: center;
}

main {
  display: -ms-flexbox; /* IE10 */
  display: flex;
  -ms-flex-wrap: wrap; /* IE10 */
  flex-wrap: wrap;
  padding: 0 4px;
}

/* Create four equal columns that sits next to each other */
.column {
  -ms-flex: 25%; /* IE10 */
  flex: 25%;
  max-width: 25%;
  padding: 0 4px;
}

.column img {
  margin-top: 8px;
  vertical-align: middle;
  width: 100%;
}

/* Responsive layout - makes a two column-layout instead of four columns */
@media screen and (max-width: 800px) {
  .column {
    -ms-flex: 50%;
    flex: 50%;
    max-width: 50%;
  }
}

/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 600px) {
  .column {
    -ms-flex: 100%;
    flex: 100%;
    max-width: 100%;
  }
}
</style>
</head>

<body>
    <header>
        <h1>Responsive Image Grid</h1>
        <p>Resize the browser window to see the responsive effect.</p>
    </header>

    <main> 
        <div class="column">
            <img src="../images/italy.jpg" style="width:100%" alt="The Ponte Vecchio at sunset">
            <img src="../images/homepage-image.jpg" style="width:100%" alt="Homepage Image">
            <img src="../images/boilingpasta.jpg" style="width:100%" alt="Boiling Pasta">
            <img src="../images/carbonara.jpg" style="width:100%" alt="Carbonara">
            <img src="../images/headshot.jpg" style="width:100%" alt="Headshot of Kate Witham">
            <img src="../images/umass-amherst-logo.jpg" style="width:100%" alt="UMass Amherst Logo">
            <img src="../images/italy.jpg" style="width:100%" alt="The Ponte Vecchio at sunset">
        </div>
        <div class="column">
            <img src="../images/carbonara.jpg" style="width:100%" alt="Carbonara">
            <img src="../images/headshot.jpg" style="width:100%" alt="Headshot of Kate Witham">
            <img src="../images/umass-amherst-logo.jpg" style="width:100%" alt="UMass Amherst Logo">
            <img src="../images/italy.jpg" style="width:100%" alt="The Ponte Vecchio at sunset">
            <img src="../images/italy.jpg" style="width:100%" alt="The Ponte Vecchio at sunset">
            <img src="../images/homepage-image.jpg" style="width:100%" alt="Homepage Image">
            <img src="../images/boilingpasta.jpg" style="width:100%" alt="Boiling Pasta">
        
        </div>
        <div class="column">
            <img src="../images/boilingpasta.jpg" style="width:100%" alt="Boiling Pasta">
            <img src="../images/carbonara.jpg" style="width:100%" alt="Carbonara">
            <img src="../images/headshot.jpg" style="width:100%" alt="Headshot of Kate Witham">
            <img src="../images/umass-amherst-logo.jpg" style="width:100%" alt="UMass Amherst Logo">
            <img src="../images/italy.jpg" style="width:100%" alt="The Ponte Vecchio at sunset">
            <img src="../images/homepage-image.jpg" style="width:100%" alt="Homepage Image">
            <img src="../images/italy.jpg" style="width:100%" alt="The Ponte Vecchio at sunset">
        </div>
        <div class="column">

            <img src="../images/homepage-image.jpg" style="width:100%" alt="Homepage Image">

</body>
</html>
